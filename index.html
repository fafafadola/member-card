<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원증 조회</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans KR", sans-serif;
  background: #e8f5e9;
  text-align: center;
}

/* 로고 */
.logo {
  width: 100px;
  margin-top: 15px;
}

/* 제목 */
h1 {
  font-size: 22px;
  color: white;
  text-shadow:
    -1px -1px 0 #1b5e20,
     1px -1px 0 #1b5e20,
    -1px  1px 0 #1b5e20,
     1px  1px 0 #1b5e20;
}

h3 {
  color: #2e7d32;
}

/* 검색창 */
.search-box {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 15px auto;
  width: 90%;
  max-width: 350px;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.search-box button {
  padding: 12px 16px;
  border-radius: 20px;
  border: none;
  background: #2e7d32;
  color: white;
}

/* 카드 */
.card {
  position: relative;
  width: 90%;
  max-width: 340px;
  margin: 20px auto;
  border-radius: 12px;
  background: white;
  padding: 25px 20px;
  border: 2px solid #2e7d32;
  overflow: hidden;
}

/* 워터마크 */
.card::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  background: url('https://raw.githubusercontent.com/fafafadola/member-card/main/logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.08;
  transform: translate(-50%, -50%);
}

/* 사진 */
.profile {
  width: 140px;
  height: 140px;
  border-radius: 10px;
  margin: 15px 0;
  object-fit: cover;
  border: 1px solid #ccc;
}

/* 정보 */
.info-row {
  display: flex;
  justify-content: space-between;
  font-family: monospace;
  margin-bottom: 6px;
}
.info-label {
  font-weight: bold;
}
.info-value {
  text-align: right;
  word-break: break-word;
}

/* 흐르는 문구 */
.marquee {
  margin-top: 20px;
  overflow: hidden;
  white-space: nowrap;
  border-top: 1px solid #ddd;
  padding-top: 10px;
}

.marquee span {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 10s linear infinite;
  color: #1b5e20;
  font-weight: bold;
}

@keyframes scrollText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<!-- ✅ 로고 적용 완료 -->
<img src="https://raw.githubusercontent.com/fafafadola/member-card/main/logo.png" class="logo">

<h1>한강지키기 남양주지역본부</h1>
<h3>회원 검색</h3>

<div class="search-box">
  <input type="text" id="nameInput" placeholder="이름 입력">
  <button onclick="searchMember()">검색</button>
</div>

<div id="result"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/1_rbmvgM1XXrXhOnlPRvUO0XEiTHJEiw4tI9tmFv_wrU/회원DB";

let members = [];

fetch(sheetURL)
.then(res => res.json())
.then(data => members = data);

function searchMember() {
  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  const filtered = members.filter(m => m.이름.includes(name));

  if (filtered.length === 0) {
    result.innerHTML = "검색 결과 없음";
    return;
  }

  if (filtered.length > 1) {
    let html = "<h4>동명이인 선택</h4>";
    filtered.forEach((m,i)=>{
      html += `<button onclick="showCard(${i})">${m.이름} (${m.회원번호})</button><br>`;
    });
    result.innerHTML = html;
    window.filteredMembers = filtered;
  } else {
    showSingle(filtered[0]);
  }
}

function showCard(i){
  showSingle(window.filteredMembers[i]);
}

function showSingle(m){
  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>회원증</h2>
      <img src="${m.사진URL}" class="profile">

      <div class="info-row"><span class="info-label">회원번호</span><span class="info-value">${m.회원번호}</span></div>
      <div class="info-row"><span class="info-label">이름</span><span class="info-value">${m.이름}</span></div>
      <div class="info-row"><span class="info-label">단체명</span><span class="info-value">${m.단체명}</span></div>

      <div class="marquee">
        <span>이 사람은 한강지키기운동 회원임을 인증합니다.</span>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
