<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원증 조회</title>

<!-- QR코드 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<!-- html2canvas 라이브러리 (이미지 다운로드용) -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #b2f2bb, #69db7c);
    text-align: center;
}

.container {
    padding: 20px;
}

h1 { color: white; font-size: 24px; margin-bottom: 5px;}
h3 { color: white; font-weight: 400; margin-top: 0;}

input {
    width: 70%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    margin-top: 10px;
}

button {
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #2f9e44;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

.card {
    width: 320px;
    margin: 20px auto;
    border-radius: 20px;
    background: white;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card img {
    border-radius: 50%;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>한강지키기 남양주지역본부</h1>
    <h3>회원 검색</h3>

    <input type="text" id="nameInput" placeholder="이름 입력"><br>
    <button onclick="searchMember()">검색</button>

    <div id="result"></div>
</div>

<script>
// 여기 JSON 주소 적용
const sheetURL = "https://opensheet.elk.sh/1_rbmvgM1XXrXhOnlPRvUO0XEiTHJEiw4tI9tmFv_wrU/회원DB";

let members = [];

fetch(sheetURL)
    .then(res => res.json())
    .then(data => members = data);

function searchMember() {
    const name = document.getElementById("nameInput").value.trim();
    const result = document.getElementById("result");

    const filtered = members.filter(m => m.이름.includes(name));

    if(filtered.length === 0) {
        result.innerHTML = "검색 결과 없음";
        return;
    }

    if(filtered.length > 1) {
        let html = "<h4>동명이인 선택</h4>";
        filtered.forEach((m,i)=>{
            html += `<button onclick="showCard(${i})">${m.이름} (${m.회원번호})</button><br>`;
        });
        result.innerHTML = html;
        window.filteredMembers = filtered;
    } else {
        showSingle(filtered[0]);
    }
}

function showCard(i){
    showSingle(window.filteredMembers[i]);
}

function showSingle(m){
    document.getElementById("result").innerHTML = `
        <div class="card" id="card">
            <h3>회원증</h3>
            <img src="${m.사진URL}" width="100" height="100"><br>
            회원번호: ${m.회원번호}<br>
            이름: ${m.이름}<br>
            단체명: ${m.단체명}<br>
            <canvas id="qrcode"></canvas><br>
            <button onclick="downloadCard()">저장</button>
        </div>
    `;
    QRCode.toCanvas(document.getElementById('qrcode'), m.회원번호);
}

function downloadCard(){
    html2canvas(document.getElementById("card")).then(canvas=>{
        const link = document.createElement("a");
        link.download = "회원증.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
